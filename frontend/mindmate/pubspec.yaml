name: mindmate
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  flutter_secure_storage: ^10.3.1
  uuid: ^4.5.3
  bip39: ^1.0.6
  crypto: ^3.0.7
  http: ^1.6.0
  image_picker: ^1.1.2
  visibility_detector: ^0.4.0+2
  video_player: ^2.8.2
  intl: ^0.20.2
  permission_handler: ^12.0.3
  speech_to_text: ^6.5.0
  flutter_tts: ^3.8.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/videos/start_video.mp4
    - .env
